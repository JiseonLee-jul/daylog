<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daylog</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px;
    }
    h1 { color: #f0f6fc; margin-bottom: 24px; font-size: 1.5rem; }
    h2 { color: #8b949e; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .card a { color: #58a6ff; text-decoration: none; }
    .card a:hover { text-decoration: underline; }

    .today-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .today-title { color: #f0f6fc; font-size: 1.1rem; font-weight: 600; }
    .issue-number { color: #8b949e; font-size: 0.875rem; }
    .today-body { white-space: pre-wrap; font-size: 0.875rem; line-height: 1.6; }
    .today-empty { color: #8b949e; font-style: italic; }

    .milestone-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid #21262d;
    }
    .milestone-item:last-child { border-bottom: none; }
    .milestone-name { flex: 1; }
    .milestone-bar {
      width: 120px;
      height: 8px;
      background: #21262d;
      border-radius: 4px;
      overflow: hidden;
    }
    .milestone-bar-fill {
      height: 100%;
      background: #238636;
      border-radius: 4px;
    }
    .milestone-pct { width: 40px; text-align: right; font-size: 0.875rem; color: #8b949e; }
    .milestone-due { font-size: 0.75rem; color: #8b949e; width: 70px; text-align: right; }

    .recent-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #21262d;
      font-size: 0.875rem;
    }
    .recent-item:last-child { border-bottom: none; }

    .loading { color: #8b949e; font-style: italic; }
    .section { margin-bottom: 32px; }
  </style>
</head>
<body>
  <h1>Daylog</h1>

  <div class="section">
    <h2>Today</h2>
    <div class="card" id="today-card">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <div class="section">
    <h2>Milestones</h2>
    <div class="card" id="milestones-card">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <div class="section">
    <h2>Recent</h2>
    <div class="card" id="recent-card">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <script>
    const REPO_OWNER = 'JiseonLee-jul';
    const REPO_NAME = 'daylog';

    const DAYS = ['일', '월', '화', '수', '목', '금', '토'];

    function getTodayTitle() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');
      const day = DAYS[now.getDay()];
      return `${y}-${m}-${d} (${day})`;
    }

    function getNewIssueUrl(title) {
      return `https://github.com/${REPO_OWNER}/${REPO_NAME}/issues/new?template=daily.yml&title=${encodeURIComponent(title)}&labels=daily`;
    }

    function truncateBody(body, maxLines = 10) {
      if (!body) return '';
      const lines = body.split('\n').slice(0, maxLines);
      return lines.join('\n');
    }

    async function load() {
      let issues = [];
      let milestones = [];

      try {
        const issuesRes = await fetch('data/issues.json');
        issues = await issuesRes.json();
      } catch (e) { /* no data yet */ }

      try {
        const msRes = await fetch('data/milestones.json');
        milestones = await msRes.json();
      } catch (e) { /* no data yet */ }

      renderToday(issues);
      renderMilestones(milestones);
      renderRecent(issues);
    }

    function renderToday(issues) {
      const card = document.getElementById('today-card');
      const todayTitle = getTodayTitle();
      const todayIssue = issues.find(i => i.title === todayTitle);

      if (todayIssue) {
        card.innerHTML = `
          <div class="today-header">
            <span class="today-title"><a href="${todayIssue.html_url}">${todayIssue.title}</a></span>
            <span class="issue-number">#${todayIssue.number}</span>
          </div>
          <div class="today-body">${truncateBody(todayIssue.body)}</div>
        `;
      } else {
        const url = getNewIssueUrl(todayTitle);
        card.innerHTML = `
          <div class="today-empty">
            No entry for today.
            <a href="${url}">Create today's planner</a>
          </div>
        `;
      }
    }

    function renderMilestones(milestones) {
      const card = document.getElementById('milestones-card');
      const open = milestones.filter(m => m.state === 'open');

      if (open.length === 0) {
        card.innerHTML = '<div class="today-empty">No active milestones</div>';
        return;
      }

      card.innerHTML = open.map(m => {
        const total = m.open_issues + m.closed_issues;
        const pct = total > 0 ? Math.round((m.closed_issues / total) * 100) : 0;
        const due = m.due_on ? new Date(m.due_on).toLocaleDateString('ko-KR', { month: 'numeric', day: 'numeric' }) : '';
        return `
          <div class="milestone-item">
            <a class="milestone-name" href="${m.html_url}">${m.title}</a>
            <div class="milestone-bar"><div class="milestone-bar-fill" style="width:${pct}%"></div></div>
            <span class="milestone-pct">${pct}%</span>
            <span class="milestone-due">${due}</span>
          </div>
        `;
      }).join('');
    }

    function renderRecent(issues) {
      const card = document.getElementById('recent-card');
      const todayTitle = getTodayTitle();
      const recent = issues
        .filter(i => i.title !== todayTitle)
        .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
        .slice(0, 7);

      if (recent.length === 0) {
        card.innerHTML = '<div class="today-empty">No recent entries</div>';
        return;
      }

      card.innerHTML = recent.map(i => `
        <div class="recent-item">
          <a href="${i.html_url}">${i.title}</a>
          <span class="issue-number">#${i.number}</span>
        </div>
      `).join('');
    }

    load();
  </script>
</body>
</html>
